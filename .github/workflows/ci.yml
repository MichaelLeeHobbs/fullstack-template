name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

  unit-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run API tests with coverage
        run: pnpm --filter api test -- --coverage --reporter=default --reporter=json --outputFile=../../coverage/api-results.json

      - name: Run Web tests with coverage
        run: pnpm --filter web test -- --coverage --reporter=default --reporter=json --outputFile=../../coverage/web-results.json

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: |
            apps/api/coverage/
            apps/web/coverage/
          retention-days: 14

  e2e-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://app:app_dev@localhost:5433/app
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: app
      S3_SECRET_KEY: app_dev_password
      S3_BUCKET: app-assets
      EMAIL_PROVIDER: mock
      FRONTEND_URL: http://localhost:5174
      NODE_ENV: development
      DISABLE_RATE_LIMIT: "true"

    steps:
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=app \
            -e MINIO_ROOT_PASSWORD=app_dev_password \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14
